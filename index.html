<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4d6d,#ff8fa3,#ffc2d1);
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,.2);
    z-index:2;
}

h1{
    font-size:50px;
    margin-bottom:15px;
    animation:pulse 1.5s infinite;
}

p{
    font-size:22px;
    line-height:1.6;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

.heart{
    position:absolute;
    color:#fff;
    font-size:25px;
    animation:float 8s linear infinite;
    opacity:.8;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(.5);
    }
    100%{
        transform:translateY(-120vh) scale(1.5);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ I LOVE YOU ❤️</h1>
    <p>
        Kamu adalah alasan aku tersenyum setiap hari.<br>
        Terima kasih telah hadir dalam hidupku.<br><br>
        <b>Aku Sayang Kamu Selamanya ❤️</b>
    </p>
</div>

<script>
function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    heart.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,250);
</script>

</body>
</html>
